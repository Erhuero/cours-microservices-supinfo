server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /css/ {
        add_header Cache-Control "public, max-age=60";
    }

    location /js/ {
        add_header Cache-Control "public, max-age=60";
    }
}